- name: Install Dependencies (AL2023)
  dnf:
    name:
      - nginx
      - python3
      - python3-pip
      - mariadb105
    state: present

- name: Configure Nginx as Reverse Proxy
  copy:
    dest: /etc/nginx/conf.d/flask.conf
    content: |
      server {
          listen 80;
          location / {
              proxy_pass http://127.0.0.1:5000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          }
      }

- name: Clean up default index
  file:
    path: /usr/share/nginx/html/index.html
    state: absent

- name: Start Nginx
  service:
    name: nginx
    state: restarted
    enabled: yes

- name: Install Python requirements
  pip:
    name: 
      - flask
      - pymysql

- name: Prepare App Directory
  file:
    path: /home/ec2-user/app/
    state: directory
    owner: ec2-user
    group: ec2-user

- name: Copy App Files
  copy:
    src: ../../../../app/
    dest: /home/ec2-user/app/
    owner: ec2-user
    group: ec2-user
    mode: '0755'
    directory_mode: '0755'

- name: Wait for RDS to be reachable
  wait_for:
    host: "{{ lookup('env', 'DB_HOST') | default('localhost', true) }}"
    port: 3306
    state: started
    delay: 5
    timeout: 300
  ignore_errors: yes
  register: rds_check

- name: Fail if RDS is not reachable
  fail:
    msg: "El endpoint del RDS {{ lookup('env', 'DB_HOST') }} no responde en el puerto 3306."
  when: rds_check.failed and lookup('env', 'DB_HOST') != 'localhost'


- name: Create Systemd service for Flask
  copy:
    dest: /etc/systemd/system/flaskapp.service
    content: |
      [Unit]
      Description=Flask Application for TFG
      After=network.target nginx.service

      [Service]
      User=ec2-user
      WorkingDirectory=/home/ec2-user/app
      Environment="DB_HOST={{ lookup('env', 'DB_HOST') | default('localhost', true) }}"
      Environment="DB_USER={{ lookup('env', 'DB_USER') | default('admin', true) }}"
      Environment="DB_PASS={{ lookup('env', 'DB_PASS') | default('password', true) }}"
      Environment="DB_NAME={{ lookup('env', 'DB_NAME') | default('tfg_db', true) }}" 
      ExecStart=/usr/bin/python3 /home/ec2-user/app/app.py
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

- name: Start and Enable Flask Service
  systemd:
    name: flaskapp
    state: restarted
    enabled: yes
    daemon_reload: yes

