- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
 
- name: Install system dependencies
  apt:
    name:
      - nginx
      - python3
      - python3-pip
      - git
      - mysql-client
    state: present
 
- name: Install Python dependencies for Flask app (via apt, Ubuntu PEP 668)
  apt:
    name:
      - python3-flask
      - python3-pymysql
      - python3-cryptography
      - python3-werkzeug
    state: present
 
- name: Clone application repository
  git:
    repo: "{{ github_repo | default('https://github.com/ulisesnevado/TFG-ASIR-AAU.git') }}"
    dest: /home/ubuntu/TFG-ASIR-AAU
    version: main
    force: yes
 
- name: Ensure ubuntu owns the cloned repo
  file:
    path: /home/ubuntu/TFG-ASIR-AAU
    state: directory
    recurse: yes
    owner: ubuntu
    group: ubuntu
 
- name: Configure Nginx as reverse proxy
  template:
    src: flask.conf.j2
    dest: /etc/nginx/sites-available/flask.conf
    mode: '0644'
  notify: reload nginx
 
- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/flask.conf
    dest: /etc/nginx/sites-enabled/flask.conf
    state: link
  notify: reload nginx
 
- name: Disable default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
 
- name: Wait for RDS to be reachable
  wait_for:
    host: "{{ db_host }}"
    port: 3306
    state: started
    delay: 5
    timeout: 300
 
- name: Create systemd service for Flask
  copy:
    dest: /etc/systemd/system/flaskapp.service
    mode: '0644'
    content: |
      [Unit]
      Description=Flask application (TFG FOCA)
      After=network.target
 
      [Service]
      User=ubuntu
      WorkingDirectory=/home/ubuntu/TFG-ASIR-AAU/app
      Environment="DB_HOST={{ db_host }}"
      Environment="DB_USER={{ db_user }}"
      Environment="DB_PASS={{ db_pass }}"
      Environment="DB_NAME={{ db_name }}"
      ExecStart=/usr/bin/python3 /home/ubuntu/TFG-ASIR-AAU/app/app.py
      Restart=always
      RestartSec=5
      StandardOutput=append:/var/log/flaskapp.log
      StandardError=append:/var/log/flaskapp.log
 
      [Install]
      WantedBy=multi-user.target
  notify: restart flaskapp
 
- name: Ensure log file exists
  file:
    path: /var/log/flaskapp.log
    state: touch
    owner: ubuntu
    group: ubuntu
    mode: '0644'
 
- name: Enable and start Flask service
  systemd:
    name: flaskapp
    enabled: yes
    state: started
    daemon_reload: yes
 
- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started