- name: Install nginx
  yum:
    name: nginx
    state: present

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Create index page
  copy:
    content: |
      <h1>TFG Cloud Project</h1>
      <p>Servidor activo</p>
      <p>Hostname: {{ ansible_hostname }}</p>
      <p>IP: {{ ansible_default_ipv4.address }}</p>
    dest: /usr/share/nginx/html/index.html

- name: Create health endpoint
  copy:
    content: OK
    dest: /usr/share/nginx/html/health

- name: Install python3 and pip
  yum:
    name:
      - python3
      - python3-pip
    state: present

- name: Install Flask
  pip:
    name: flask

- name: Install MySQL client
  yum:
    name: mysql
    state: present

- name: Install PyMySQL
  pip:
    name: pymysql

- name: Copy app files
  copy:
    src: ../../../../app/
    dest: /home/ec2-user/app/
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Run Flask app
  shell: nohup python3 /home/ec2-user/app/app.py &
  environment:
    DB_HOST: "localhost"
    DB_USER: "admin"
    DB_PASS: "password"
    DB_NAME: "tfg_db"
