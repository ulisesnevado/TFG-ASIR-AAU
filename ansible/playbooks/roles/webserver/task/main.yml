- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install dependencies
  apt:
    name:
      - nginx
      - python3
      - python3-pip
      - python3-venv
      - git
      - mysql-client
      - libmysqlclient-dev
      - build-essential
    state: present

- name: Clone application repository
  git:
    repo: https://github.com/ulisesnevado/TFG-ASIR-AAU.git
    dest: /home/ubuntu/TFG-ASIR-AAU
    version: main
    force: yes
  become_user: ubuntu

- name: Install Python requirements for Flask app
  pip:
    name:
      - flask
      - pymysql
      - cryptography
      - werkzeug
    executable: pip3

- name: Configure Nginx as reverse proxy
  template:
    src: flask.conf.j2
    dest: /etc/nginx/sites-available/flask.conf
    mode: '0644'
  notify: reload nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/flask.conf
    dest: /etc/nginx/sites-enabled/flask.conf
    state: link
  notify: reload nginx

- name: Disable default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Wait for RDS to be reachable
  wait_for:
    host: "{{ lookup('env', 'DB_HOST') }}"
    port: 3306
    state: started
    delay: 5
    timeout: 300
  when: lookup('env', 'DB_HOST') | length > 0

- name: Create systemd service for Flask
  copy:
    dest: /etc/systemd/system/flaskapp.service
    mode: '0644'
    content: |
      [Unit]
      Description=Flask application (TFG FOCA)
      After=network.target

      [Service]
      User=ubuntu
      WorkingDirectory=/home/ubuntu/TFG-ASIR-AAU/app
      Environment="DB_HOST={{ lookup('env', 'DB_HOST') }}"
      Environment="DB_USER={{ lookup('env', 'DB_USER') }}"
      Environment="DB_PASS={{ lookup('env', 'DB_PASS') }}"
      Environment="DB_NAME={{ lookup('env', 'DB_NAME') }}"
      ExecStart=/usr/bin/python3 /home/ubuntu/TFG-ASIR-AAU/app/app.py
      Restart=always
      RestartSec=5
      StandardOutput=append:/var/log/flaskapp.log
      StandardError=append:/var/log/flaskapp.log

      [Install]
      WantedBy=multi-user.target
  notify: restart flaskapp

- name: Ensure log file exists
  file:
    path: /var/log/flaskapp.log
    state: touch
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Enable and start Flask service
  systemd:
    name: flaskapp
    enabled: yes
    state: started
    daemon_reload: yes

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started