{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border-b-8 border-blue-600 transform hover:scale-[1.01] transition-all">
        <h2 class="text-3xl font-bold text-slate-800 mb-2 text-center">Acceder 🌊</h2>
        <p class="text-slate-500 text-center mb-8">Continúa tu investigación fócida</p>

        {% if error %}
            <div class="bg-red-50 text-red-600 p-4 rounded-xl text-center mb-6 text-sm font-medium border border-red-100 italic">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Nombre de Usuario</label>
                <input name="username" placeholder="Tu alias foca" 
                       class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none transition-all" 
                       required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Contraseña</label>
                <input name="password" type="password" placeholder="Tu clave secreta" 
                       class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none transition-all" 
                       required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-extrabold text-lg shadow-lg hover:bg-blue-700 hover:shadow-blue-200 transition-all active:scale-95">
                Iniciar Sesión
            </button>
        </form>

        <p class="mt-8 text-center text-slate-500 font-medium">
            ¿Aún no eres miembro? <a href="{{ url_for('register') }}" class="text-blue-600 font-bold hover:underline">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
